<svg width="680" height="266" viewBox="0 0 680 266" xmlns="http://www.w3.org/2000/svg" role="img">
<title>System architecture</title>
<desc>Temperature sensor feeds an Arduino Uno, which drives a 16x2 LCD and sends readings over USB serial to a PC client, which publishes to an MQTT broker on a VPS.</desc>
<rect x="0" y="0" width="680" height="266" fill="#ffffff"/>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#444444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#1a1a1a">System architecture</text>
<text x="340" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555555">Temperature sensor -&gt; Arduino Uno -&gt; LCD / USB serial -&gt; PC client -&gt; MQTT broker</text>

<line x1="170" y1="98" x2="190" y2="98" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="320" y1="98" x2="340" y2="98" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="470" y1="98" x2="490" y2="98" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="255" y1="126" x2="255" y2="190" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="40" y="70" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="105" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Temp sensor</text>
  <text x="105" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444441">LM35 analog</text>
</g>

<g>
  <rect x="190" y="70" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="255" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Arduino Uno</text>
  <text x="255" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">Reads &amp; sends</text>
</g>

<g>
  <rect x="190" y="190" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="255" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">16x2 LCD</text>
  <text x="255" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444441">Name + temp</text>
</g>

<g>
  <rect x="340" y="70" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="405" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">PC client</text>
  <text x="405" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Serial + MQTT</text>
</g>

<g>
  <rect x="490" y="70" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="555" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">MQTT broker</text>
  <text x="555" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">VPS server</text>
</g>
</svg>
